    digital:L('數位設計','Digital Design'),
    marketing:L('行銷規劃','Marketing Plan'),

function localize(p){
  return Object.assign({}, p, {
    title: L(p.titleZh, p.titleEn),

    desc: L(p.descZh, p.descEn),

}

function hov(label){
  return `data-hov="${label}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}"`;

/* =========================================================
   路由 / 狀態切換
   ========================================================= */
function render(){
  const root = document.getElementById('app');
  let body;
  if(state.route==='home') body = renderHome();
  else if(state.route==='works') body = renderWorks();
  else if(state.route==='project') body = renderProject();
  else if(state.route==='about') body = renderAbout();
  else body = renderContact();
  root.innerHTML = renderNav() + body;
  if(state.route==='works'){ requestAnimationFrame(updateProgress); }
}

function go(route){
  state.route = route;
  render();
  try{ window.scrollTo({top:0, behavior:'instant'}); }catch(e){ window.scrollTo(0,0); }
}
function goWorksAll(){ state.route='works'; state.cat='all'; render(); }
function setCat(cat){ state.route='works'; state.cat=cat; render(); }
function openProject(id){ state.route='project'; state.cur=id; render(); window.scrollTo(0,0); }
function prevProject(){
  const order = PROJECTS.map(p=>p.id);
  const ci = Math.max(0, order.indexOf(state.cur));
  state.cur = order[(ci-1+order.length)%order.length];
  state.route = 'project'; render(); window.scrollTo(0,0);
}
function nextProject(){
  const order = PROJECTS.map(p=>p.id);
  const ci = Math.max(0, order.indexOf(state.cur));
  state.cur = order[(ci+1)%order.length];
  state.route = 'project'; render(); window.scrollTo(0,0);
}
function toggleLang(){ state.lang = state.lang==='zh' ? 'en' : 'zh'; render(); }

function updateProgress(){
  const rail = document.getElementById('works-rail');
  const prog = document.getElementById('works-prog');
  if(!rail || !prog) return;
  const max = rail.scrollWidth - rail.clientWidth;
  const r = max>0 ? rail.scrollLeft/max : 0;
  prog.style.width = (14 + r*86) + '%';
}

/* =========================================================
   全域互動(自訂游標 / 滾輪橫向捲動)
   ========================================================= */
document.addEventListener('DOMContentLoaded', function(){
  const cur = document.getElementById('cc-cursor');
  const lab = document.getElementById('cc-label');

  window.addEventListener('mousemove', function(e){
    if(cur) cur.style.transform = 'translate(' + e.clientX + 'px,' + e.clientY + 'px)';
  }, {passive:true});

  document.addEventListener('mouseover', function(e){
    const t = e.target.closest('[data-hov]');
    if(!cur) return;
    if(t){
      const txt = t.getAttribute('data-hov');
      cur.style.width='64px'; cur.style.height='64px'; cur.style.margin='-32px 0 0 -32px';
      cur.style.background = txt ? '#fa491c' : 'rgba(250,73,28,.18)';
      if(lab){ lab.textContent = txt || ''; lab.style.opacity = txt ? '1' : '0'; }
    } else {
      cur.style.width='10px'; cur.style.height='10px'; cur.style.margin='-5px 0 0 -5px';
      cur.style.background='#fa491c';
      if(lab){ lab.style.opacity='0'; lab.textContent=''; }
    }
  }, {passive:true});

  window.addEventListener('wheel', function(e){
    if(state.route!=='works') return;
    const rail = document.getElementById('works-rail');
    if(!rail) return;
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      rail.scrollLeft += e.deltaY;
      e.preventDefault();
    }
    updateProgress();
  }, {passive:false});

  document.addEventListener('scroll', function(){ updateProgress(); }, {passive:true, capture:true});

  render();
});
</script>
